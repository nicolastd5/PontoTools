<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PontoTools - Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 640px; margin: 0 auto; }
    .header {
      text-align: center;
      margin-bottom: 32px;
      padding: 24px 0;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 14px;
      color: #64748b;
    }
    .overall {
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-weight: 700;
      font-size: 18px;
    }
    .overall.ok { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .overall.down { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
    .overall.partial { background: #451a03; color: #fbbf24; border: 1px solid #92400e; }
    .overall.checking { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      margin-bottom: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-left { display: flex; align-items: center; gap: 14px; }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.online { background: #4ade80; box-shadow: 0 0 8px #4ade8060; }
    .dot.offline { background: #f87171; box-shadow: 0 0 8px #f8717160; }
    .dot.checking { background: #94a3b8; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .service-name { font-weight: 600; font-size: 15px; color: #f1f5f9; }
    .service-url { font-size: 12px; color: #64748b; margin-top: 2px; }
    .badge {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .badge.online { background: #052e16; color: #4ade80; }
    .badge.offline { background: #450a0a; color: #f87171; }
    .badge.checking { background: #1e293b; color: #94a3b8; }
    .response-time {
      font-size: 11px;
      color: #64748b;
      text-align: right;
      margin-top: 4px;
    }
    .card-right { text-align: right; }
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: #475569;
    }
    .footer span { color: #64748b; }
    .refresh-info {
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-top: 16px;
    }
    .history {
      margin-top: 24px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px 20px;
    }
    .history h3 {
      font-size: 14px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 12px;
    }
    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid #334155;
    }
    .history-row:last-child { border-bottom: none; }
    .history-time { color: #64748b; font-family: monospace; }
    .history-status { font-weight: 600; }
    .history-status.ok { color: #4ade80; }
    .history-status.fail { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PontoTools Status</h1>
      <p>Monitoramento dos servicos em tempo real</p>
    </div>

    <div id="overall" class="overall checking">Verificando...</div>

    <div id="services"></div>

    <div class="history" id="historyBox" style="display:none">
      <h3>Ultimas verificacoes</h3>
      <div id="historyList"></div>
    </div>

    <div class="refresh-info">Atualiza automaticamente a cada 30 segundos</div>

    <div class="footer">
      <span id="lastCheck">--</span>
    </div>
  </div>

  <script>
    function buildServiceUrl(port, path = '/') {
      const base = new URL(`${window.location.protocol}//${window.location.hostname}`);
      base.port = String(port);
      base.pathname = path;
      return base.toString();
    }

    const SERVICES = [
      {
        name: 'Backend API',
        url: buildServiceUrl(3001, '/health'),
        description: 'Servidor Express.js + PostgreSQL',
        check: 'http'
      },
      {
        name: 'Frontend Web',
        url: buildServiceUrl(5173, '/'),
        description: 'React + Vite (Dashboard)',
        check: 'reachability'
      }
    ];

    const history = [];
    const MAX_HISTORY = 10;

    function renderServices(results) {
      const container = document.getElementById('services');
      container.innerHTML = results.map(r => `
        <div class="card">
          <div class="card-left">
            <div class="dot ${r.status}"></div>
            <div>
              <div class="service-name">${r.name}</div>
              <div class="service-url">${r.description}</div>
            </div>
          </div>
          <div class="card-right">
            <div class="badge ${r.status}">
              ${r.status === 'online' ? 'Operacional' : r.status === 'offline' ? 'Fora do ar' : 'Verificando...'}
            </div>
            ${r.responseTime ? `<div class="response-time">${r.responseTime}ms</div>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderOverall(results) {
      const el = document.getElementById('overall');
      const online = results.filter(r => r.status === 'online').length;
      const total = results.length;

      if (online === total) {
        el.className = 'overall ok';
        el.textContent = 'Todos os servicos operacionais';
      } else if (online === 0) {
        el.className = 'overall down';
        el.textContent = 'Todos os servicos fora do ar';
      } else {
        el.className = 'overall partial';
        el.textContent = `${online}/${total} servicos operacionais`;
      }
    }

    function renderHistory() {
      const box = document.getElementById('historyBox');
      const list = document.getElementById('historyList');
      if (history.length === 0) { box.style.display = 'none'; return; }
      box.style.display = 'block';
      list.innerHTML = history.map(h => `
        <div class="history-row">
          <span class="history-time">${h.time}</span>
          <span class="history-status ${h.allOk ? 'ok' : 'fail'}">
            ${h.allOk ? 'Tudo OK' : h.summary}
          </span>
        </div>
      `).join('');
    }

    async function checkService(service) {
      const start = Date.now();
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);

      try {
        if (service.check === 'http') {
          const response = await fetch(service.url, {
            cache: 'no-store',
            signal: controller.signal
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
        } else {
          await fetch(service.url, {
            mode: 'no-cors',
            cache: 'no-store',
            signal: controller.signal
          });
        }

        return { ...service, status: 'online', responseTime: Date.now() - start };
      } catch {
        return { ...service, status: 'offline', responseTime: null };
      } finally {
        clearTimeout(timeout);
      }
    }

    async function checkAll() {
      const loading = SERVICES.map(s => ({ ...s, status: 'checking', responseTime: null }));
      renderServices(loading);

      const results = await Promise.all(SERVICES.map(checkService));
      renderServices(results);
      renderOverall(results);

      const now = new Date();
      document.getElementById('lastCheck').textContent =
        `Ultima verificacao: ${now.toLocaleTimeString('pt-BR')}`;

      const online = results.filter(r => r.status === 'online');
      const offline = results.filter(r => r.status === 'offline');
      history.unshift({
        time: now.toLocaleTimeString('pt-BR'),
        allOk: offline.length === 0,
        summary: offline.map(r => r.name + ' OFF').join(', ')
      });
      if (history.length > MAX_HISTORY) history.pop();
      renderHistory();
    }

    checkAll();
    setInterval(checkAll, 30000);
  </script>
</body>
</html>
