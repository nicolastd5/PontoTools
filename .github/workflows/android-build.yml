name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências (limpo)
        working-directory: mobile
        run: |
          rm -rf node_modules
          npm install --legacy-peer-deps

      - name: Tornar gradlew executável
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build APK debug
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -200

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PontoMobile-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
