name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar dependências
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Tornar gradlew executável
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build APK debug
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.sdk-root }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PontoMobile-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
