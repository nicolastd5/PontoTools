name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências (limpo)
        working-directory: mobile
        run: |
          rm -rf node_modules
          npm install --legacy-peer-deps

      - name: Gerar bundle JS
        working-directory: mobile
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Injetar google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > mobile/android/app/google-services.json

      - name: Tornar gradlew executável
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build APK debug (com bundle embutido)
        working-directory: mobile/android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
          exit ${PIPESTATUS[0]}

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GerenciadorServicos-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Gradle log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 3
